<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">
<title>Proffesional To-Do App</title>
<style>
body {
    font-family:Arial;
    background:#f4f6f9;
    text-align:center;
}
h1 {
    background:#2c3e50;
    color:white;
    padding:15px;
}
form {
    margin:10px;
}
input ,select{
    padding:8px;
    margin:5px;
}
button {
    padding:8px 12px;
    color:white;
    border:none;
    cursor:pointer;
}
.add-btn{background:#27ae60;}
.search-btn{background:#8e44ad;}
.clear-btn{background:#c0392b;}

table{
    margin:auto;
    border-collapse:collapse;
    width:75%;
    background:white;
}
th,td{
    padding:10px;
    border:1px solid #ddd;
}
th{
    background:#2980b9;
    color:white;
}
.completed{
    color:green;
    font-weight:bold;
}
.pending{
    color:red;
    font-weight:bold;
}
a {
    text-decoration:none;
    margin:5px;
}
</style>
</head>
<body>
<div class="container mt-4">
<h1>To-Do List Manager</h1>
<form action="/add" method="POST">
<input type="text" name="title" placeholder="Task Title" required>
<input type="date" name="due_date" required>
<button type="submit" class="add-btn">Add Task</button>
</form>

<form method="GET" action="/">
<input type="text" name="search" placeholder="Search tasks..." value="{{search_query}}">
<select name="status">
<option value="all" {% if status_filter=="all" %}selected{% endif %}>All</option>
<option value="pending" {% if status_filter=="pending" %}selected{% endif %}>Pending</option>
<option value="completed" {% if status_filter=="completed" %}selected{% endif %}>Completed</option>
</select>
<button type="submit" class="search-btn">Search</button>
<a href="/">
<button type="button" class="clear-btn">Clear</button>
</a>
</form>
<table>
<tr>
<th>Task</th>
<th>Due Date</th>
<th>Status</th>
<th>Actions</th>
</tr>
{% for task in tasks %}
<tr>
<td>{{task.title}}</td>
<td>{{task.due_date}}</td>
<td>
{% if task.completed %}
<span class="completed">Completed</span>
{% else %}
<span class="pending">Pending</span>
{% endif %}
</td>
<td>
<a href="/complete/{{ loop.index0 }}">&#10003</a>
<a href="/edit/{{ loop.index0 }}">&#9999</a>
<a href="/delete/{{ loop.index0 }}">&#10060</a>
</td>
</tr>
{% endfor %}
</table>
</div>
</body>
</html>
